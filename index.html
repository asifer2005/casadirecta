<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CasaDirecta — Web + reservas directas para casas rurales (sin comisión)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c100e; --surface:#141b18; --surface2:#1b2420; --surface3:#222e28; --border:#283631;
    --text:#eef3f0; --muted:#9fb3aa; --faint:#7b8c84;
    --accent:#2fb574; --accent-h:#36c47f; --accent-ink:#04130b; --accent-soft:rgba(47,181,116,.12);
    --blue:#5aa6e6; --amber:#e0a64a; --red:#e2685c;
    --r:10px; --r-lg:16px;
    --shadow:0 16px 40px -12px rgba(0,0,0,.55);
    --sp:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:"Inter","Inter var",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.55;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    font-feature-settings:"cv02","cv03","cv04","ss01"}
  button{font-family:inherit;cursor:pointer;color:inherit}
  input,select,textarea{font-family:inherit}
  svg{display:block}
  .tnum{font-variant-numeric:tabular-nums}
  .ic{display:inline-block;vertical-align:-2px;width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
  .btn .ic{width:15px;height:15px}
  .kpi .k .ic{width:14px;height:14px;color:var(--faint)}
  .card .head h2 .ic{width:16px;height:16px;color:var(--muted);vertical-align:-3px;margin-right:2px}
  .value .ic{color:var(--accent);width:16px;height:16px;vertical-align:-3px}
  ::selection{background:var(--accent-soft);color:var(--text)}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
  .app{display:flex;min-height:100vh}
  /* ---------- Sidebar ---------- */
  .sidebar{width:248px;background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:20px 16px;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 22px}
  .brand .logo{width:34px;height:34px;border-radius:9px;background:var(--accent);
    display:flex;align-items:center;justify-content:center;color:var(--accent-ink)}
  .brand .logo svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2.2}
  .brand b{font-size:17px;letter-spacing:-.35px;font-weight:700}
  .nav{display:flex;flex-direction:column;gap:3px;margin-top:2px}
  .nav button{display:flex;align-items:center;gap:11px;background:none;border:none;color:var(--muted);
    padding:10px 12px;border-radius:9px;font-size:14px;font-weight:500;text-align:left;width:100%;transition:background .12s,color .12s}
  .nav button:hover{background:var(--surface2);color:var(--text)}
  .nav button.active{background:var(--accent-soft);color:var(--accent);font-weight:600;position:relative}
  .nav button.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--accent)}
  .nav button svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.9;flex-shrink:0}
  .nav .badge{margin-left:auto;background:var(--accent);color:var(--accent-ink);font-size:11px;font-weight:700;
    min-width:19px;height:19px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 5px}
  .plan-badge{margin-top:auto;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px}
  .plan-badge .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--faint);font-weight:600}
  .plan-badge .pname{font-weight:700;font-size:15px;margin:3px 0 8px;display:flex;align-items:center;gap:7px}
  .plan-badge .pname .pro{background:var(--accent);color:var(--accent-ink);font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px;letter-spacing:.5px}
  .plan-badge small{display:block;color:var(--faint);margin-top:2px;font-size:11.5px;line-height:1.4}
  .plan-badge button{margin-top:11px;width:100%;background:var(--accent);color:var(--accent-ink);border:none;
    padding:9px;border-radius:8px;font-weight:600;font-size:13px;transition:background .12s}
  .plan-badge button:hover{background:var(--accent-h)}
  /* ---------- Main ---------- */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;gap:16px;
    border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(12,16,14,.82);
    backdrop-filter:blur(12px);z-index:20}
  .topbar h1{font-size:20px;letter-spacing:-.5px;font-weight:700}
  .topbar .sub{color:var(--muted);font-size:13px;margin-top:1px}
  .topbar-actions{display:flex;gap:10px;align-items:center}
  .iconbtn{background:transparent;border:1px solid var(--border);color:var(--muted);width:40px;height:40px;
    border-radius:9px;display:flex;align-items:center;justify-content:center;transition:.12s}
  .iconbtn:hover{color:var(--text);border-color:var(--faint);background:var(--surface2)}
  .iconbtn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.9}
  .content{padding:26px 28px 96px;max-width:1140px;width:100%}
  /* ---------- Buttons ---------- */
  .btn{background:var(--accent);color:var(--accent-ink);border:none;padding:10px 16px;border-radius:9px;
    font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:7px;line-height:1.1;transition:background .12s,border-color .12s,opacity .12s}
  .btn:hover{background:var(--accent-h)}
  .btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  .btn.ghost:hover{border-color:var(--faint);background:var(--surface3)}
  .btn.blue{background:transparent;color:var(--blue);border:1px solid color-mix(in srgb,var(--blue) 45%,transparent)}
  .btn.blue:hover{background:color-mix(in srgb,var(--blue) 14%,transparent)}
  .btn.terra{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  .btn.sm{padding:7px 12px;font-size:13px;border-radius:8px}
  .btn.danger{background:transparent;color:var(--red);border:1px solid color-mix(in srgb,var(--red) 42%,transparent)}
  .btn.danger:hover{background:color-mix(in srgb,var(--red) 12%,transparent)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  /* ---------- KPIs ---------- */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;transition:border-color .14s}
  .kpi:hover{border-color:var(--surface3)}
  .kpi:first-child{background:linear-gradient(180deg,var(--accent-soft),transparent 55%)}
  .kpi .k{font-size:12px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:7px}
  .kpi .v{font-size:31px;font-weight:700;letter-spacing:-1.4px;margin-top:10px;font-variant-numeric:tabular-nums;color:var(--text)}
  .kpi:first-child .v{color:var(--accent)}
  .kpi .d{font-size:12px;margin-top:6px;color:var(--faint)}
  .kpi .d.good{color:var(--accent)}
  .kpi .d.bad{color:var(--amber)}
  /* ---------- Card ---------- */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:18px;overflow:hidden}
  .card .head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}
  .card .head h2{font-size:15px;letter-spacing:-.2px;font-weight:650}
  .card .body{padding:8px 8px}
  .empty{padding:44px 20px;text-align:center;color:var(--muted)}
  .empty .ico{color:var(--faint);margin-bottom:12px;display:flex;justify-content:center}
  .empty .ico svg{width:34px;height:34px;stroke:currentColor;fill:none;stroke-width:1.6}
  .empty .btn{margin-top:16px}
  /* ---------- Pills ---------- */
  .pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;letter-spacing:.1px}
  .pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
  .pill.nodot::before{display:none}
  .pill.solic{background:rgba(224,166,74,.13);color:var(--amber)}
  .pill.conf{background:rgba(47,181,116,.14);color:var(--accent)}
  .pill.canc{background:rgba(226,104,92,.14);color:var(--red)}
  .pill.bloq{background:var(--surface3);color:var(--muted)}
  /* ---------- Table ---------- */
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:600;
    padding:12px 16px;border-bottom:1px solid var(--border)}
  td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr{transition:background .1s}
  tr:hover td{background:var(--surface2)}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 28%,transparent);
    display:inline-flex;align-items:center;justify-content:center;font-weight:600;font-size:12.5px;color:var(--accent)}
  /* ---------- Modal ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(4,8,6,.66);backdrop-filter:blur(4px);z-index:100;
    display:none;align-items:center;justify-content:center;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;
    max-width:480px;box-shadow:var(--shadow);max-height:92vh;overflow:auto;animation:pop .18s ease-out}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.99)}to{opacity:1;transform:none}}
  .modal.wide{max-width:780px}
  .modal .mhead{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px}
  .modal .mhead h3{font-size:17px;font-weight:650;letter-spacing:-.2px}
  .modal .mbody{padding:20px 22px}
  .modal .mfoot{padding:16px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
  .x{background:none;border:none;color:var(--faint);font-size:24px;line-height:1;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;transition:.12s}
  .x:hover{color:var(--text);background:var(--surface2)}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:14px 0 6px}
  label:first-child{margin-top:0}
  .field,input[type=text],input[type=tel],input[type=date],input[type=number],input[type=email],select,textarea{
    width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;
    padding:11px 13px;color:var(--text);font-size:14px;transition:border-color .12s,box-shadow .12s}
  .field:focus,input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  textarea{resize:vertical;min-height:70px;line-height:1.5}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .hint{font-size:12.5px;color:var(--faint);margin-top:6px;line-height:1.5}
  .err{color:var(--red);font-size:12.5px;margin-top:8px;display:none}
  .ok{color:var(--accent);font-size:12.5px;margin-top:8px;display:none}
  /* ---------- Pricing ---------- */
  .pricing{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:4px}
  .price{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px 24px;position:relative;display:flex;flex-direction:column}
  .price.feat{border-color:color-mix(in srgb,var(--accent) 55%,transparent);background:linear-gradient(180deg,var(--accent-soft),transparent 40%)}
  .price .tag{position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:var(--accent);
    color:var(--accent-ink);font-size:10.5px;font-weight:700;padding:4px 13px;border-radius:99px;letter-spacing:.4px}
  .price h3{font-size:16px;font-weight:650}
  .price .amt{font-size:38px;font-weight:700;letter-spacing:-1.8px;margin:12px 0 2px;font-variant-numeric:tabular-nums}
  .price .amt span{font-size:14px;color:var(--faint);font-weight:500;letter-spacing:0}
  .price ul{list-style:none;margin:18px 0;display:flex;flex-direction:column;gap:11px;flex:1}
  .price li{font-size:13.5px;display:flex;gap:10px;align-items:flex-start;color:var(--muted)}
  .price li .c{color:var(--accent);font-weight:700;flex-shrink:0}
  .price li.off{color:var(--faint)}
  .price li.off .c{color:var(--faint)}
  .price .btn{width:100%;justify-content:center;margin-top:6px}
  /* ---------- Value banner ---------- */
  .value{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
    padding:16px 20px;margin-bottom:22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;position:relative}
  .value::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;background:var(--accent)}
  .value .big{font-size:14px;font-weight:500;color:var(--muted);padding-left:8px}
  .value .big b{color:var(--text);font-weight:650}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);
    background:var(--surface3);border:1px solid var(--border);padding:12px 18px;border-radius:11px;
    box-shadow:var(--shadow);font-size:13.5px;font-weight:500;z-index:300;transition:transform .28s cubic-bezier(.2,.8,.3,1);display:flex;gap:9px;align-items:center}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .paywall{background:rgba(224,166,74,.08);border:1px solid color-mix(in srgb,var(--amber) 32%,transparent);border-radius:11px;
    padding:13px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:13px;color:var(--muted)}
  .paywall b{color:var(--amber);font-weight:600}
  .lock-card{position:relative;overflow:hidden}
  .lock-ov{position:absolute;inset:0;background:rgba(12,16,14,.86);backdrop-filter:blur(3px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:24px;z-index:5}
  .lock-ov .lk{color:var(--accent);display:flex}
  .lock-ov .lk svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:1.8}
  .lock-ov b{font-size:15px;font-weight:650}
  .lock-ov p{max-width:360px;color:var(--muted);font-size:13px}
  /* ---------- Calendar ---------- */
  .calwrap{display:flex;gap:18px;flex-wrap:wrap}
  .calmain{flex:1;min-width:300px}
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
  .calhead .mtitle{font-size:17px;font-weight:650;text-transform:capitalize;min-width:170px;text-align:center;letter-spacing:-.2px}
  .calnav{display:flex;gap:8px;align-items:center}
  .calnav .btn.ghost.sm{padding:7px 9px}
  .calnav .btn .ic{width:16px;height:16px}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .calgrid .dow{text-align:center;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:600;padding:6px 0}
  .day{aspect-ratio:1/1;border-radius:9px;border:1px solid var(--border);background:var(--surface2);
    display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;font-weight:500;
    position:relative;cursor:pointer;transition:transform .1s,border-color .1s,background .1s}
  .day:hover{transform:translateY(-1px);border-color:var(--faint)}
  .day.out{opacity:.2;cursor:default;background:transparent;border-color:transparent}
  .day.out:hover{transform:none}
  .day.today{box-shadow:inset 0 0 0 1.5px var(--text)}
  .day.libre{background:var(--surface2)}
  .day.reservado{background:rgba(47,181,116,.18);border-color:color-mix(in srgb,var(--accent) 45%,transparent);color:#a8e7c4;font-weight:600}
  .day.solic{background:rgba(224,166,74,.16);border-color:color-mix(in srgb,var(--amber) 45%,transparent);color:#f1d29a;font-weight:600}
  .day.bloq{background:var(--surface3);border-color:var(--border);color:var(--faint)}
  .day.ext{background:rgba(90,166,230,.14);border-color:color-mix(in srgb,var(--blue) 42%,transparent);color:#b6d6f3;font-weight:600}
  .day .pr{font-size:9.5px;font-weight:500;color:var(--faint);margin-top:2px}
  .day.reservado .pr,.day.solic .pr{color:inherit;opacity:.8}
  .day.sel{box-shadow:inset 0 0 0 2px var(--accent)}
  .day.inrange{outline:2px dashed var(--accent);outline-offset:-2px}
  .calside{width:288px;flex-shrink:0}
  .legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:16px;font-size:12px;color:var(--muted)}
  .legend span{display:flex;align-items:center;gap:7px}
  .legend i{width:11px;height:11px;border-radius:4px;display:inline-block;border:1px solid transparent}
  /* ---------- Public preview (warm light theme for guest page) ---------- */
  .pub{background:#f7f3ec;color:#2b2620;border-radius:14px;overflow:hidden;border:1px solid var(--border)}
  .pub .hero{position:relative;height:240px;background-size:cover;background-position:center;display:flex;align-items:flex-end}
  .pub .hero .ov{position:absolute;inset:0;background:linear-gradient(transparent 30%,rgba(0,0,0,.62))}
  .pub .hero .htxt{position:relative;padding:22px 26px;color:#fff}
  .pub .hero h2{font-size:27px;letter-spacing:-.6px;font-weight:700}
  .pub .hero .loc{font-size:13px;opacity:.92;display:flex;align-items:center;gap:6px;margin-top:5px}
  .pub .hero .loc svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
  .pub .pbody{padding:24px 26px}
  .pub .desc{font-size:14.5px;line-height:1.65;color:#4d4438;white-space:pre-wrap}
  .pub .gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:20px 0}
  .pub .gallery img{width:100%;height:84px;object-fit:cover;border-radius:9px;background:#e8e0d4}
  .pub .feats{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
  .pub .feats span{background:#ece4d8;color:#5e5345;font-size:12.5px;font-weight:500;padding:6px 12px;border-radius:99px}
  .pub .seasons{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
  .pub .seasons .s{background:#ece4d8;border-radius:11px;padding:14px;text-align:center}
  .pub .seasons .s .nm{font-size:11.5px;color:#857862;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .pub .seasons .s .pp{font-size:23px;font-weight:700;color:#2b2620;margin-top:4px;font-variant-numeric:tabular-nums}
  .pub .seasons .s .pp span{font-size:12px;color:#857862;font-weight:500}
  .pub h3{font-size:15px;margin:22px 0 8px;color:#2b2620;font-weight:650}
  .pub .bookbar{background:#243a2c;color:#fff;padding:17px 26px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .pub .bookbar .pp{font-size:13px;opacity:.85}
  .pub .bookbar .pp b{font-size:21px;color:#7fe0a8;font-weight:700}
  .pub .bookbar button{background:var(--accent);color:var(--accent-ink);border:none;padding:11px 22px;border-radius:9px;font-weight:600;font-size:14px;cursor:pointer}
  .pub .bookbar button:hover{background:var(--accent-h)}
  .pub .wm{text-align:center;font-size:11.5px;color:#9c907c;padding:11px;background:#ece4d8}
  .seg{display:flex;gap:8px;flex-wrap:wrap}
  .tag-edit{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .tag-edit .t{background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:5px 10px;font-size:13px;display:flex;align-items:center;gap:7px}
  .tag-edit .t button{background:none;border:none;color:var(--faint);font-size:15px;line-height:1}
  .mobilenav{display:none}
  .booking-rowinfo{flex:1;min-width:120px}
  .booking-rowinfo b{font-size:14.5px;font-weight:600}
  .booking-rowinfo .svc{font-size:12.5px;color:var(--faint);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  @media(max-width:560px){
    .booking-rowinfo{flex:1 1 100%;min-width:0}
    .booking-rowinfo .svc{white-space:normal}
  }
  @media(max-width:920px){
    .sidebar{display:none}
    .kpis{grid-template-columns:repeat(2,1fr)}
    .pricing{grid-template-columns:1fr}
    .calside{width:100%}
    .content{padding:20px 16px 96px}
    .topbar{padding:14px 18px}

  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}

<script>
/* ---------------- Iconos ---------------- */
const IC={
  dashboard:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>',

  reservas:'<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>',
  web:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',

};
const NAVITEMS=[['dashboard','Panel'],['calendario','Calendario'],['reservas','Reservas'],['web','Mi web'],['precios','Precios y temporadas'],['suscripcion','Suscripción']];
const MNAVITEMS=[['dashboard','Panel'],['calendario','Calendario'],['reservas','Reservas'],['web','Web'],['suscripcion','Plan']];
/* Iconos de contenido (línea, heredan color). Uso: I('euro'), opcional clase con I('lock','muted') */
const ICONS={
  euro:'<path d="M14 5.5A6 6 0 0 0 6.5 11M14 18.5A6 6 0 0 1 6.5 13"/><line x1="3" y1="10" x2="12" y2="10"/><line x1="3" y1="14" x2="11" y2="14"/>',

  chart:'<line x1="4" y1="20" x2="20" y2="20"/><rect x="5" y="12" width="3" height="6"/><rect x="10.5" y="8" width="3" height="10"/><rect x="16" y="4" width="3" height="14"/>',

  cal:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
  eye:'<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>',
  globe:'<circle cx="12" cy="12" r="9"/><line x1="3" y1="12" x2="21" y2="12"/><path d="M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18z"/>',
  link:'<path d="M9 15l6-6"/><path d="M11 6l1-1a4 4 0 0 1 6 6l-2 2"/><path d="M13 18l-1 1a4 4 0 0 1-6-6l2-2"/>',
  external:'<path d="M14 4h6v6"/><path d="M20 4l-9 9"/><path d="M18 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h5"/>',
  lock:'<rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>',
  sync:'<path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><polyline points="21 3 21 8 16 8"/><polyline points="3 21 3 16 8 16"/>',
  check:'<polyline points="20 6 9 17 4 12"/>',
  x:'<line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/>',
  chevL:'<polyline points="15 6 9 12 15 18"/>',
  chevR:'<polyline points="9 6 15 12 9 18"/>',
  plus:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  arrow:'<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>',
  pin:'<path d="M12 21s-6-5.3-6-10a6 6 0 0 1 12 0c0 4.7-6 10-6 10z"/><circle cx="12" cy="11" r="2.2"/>',
  send:'<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>',
  download:'<path d="M12 3v12"/><polyline points="7 11 12 16 17 11"/><line x1="5" y1="20" x2="19" y2="20"/>',
  copy:'<rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/>'
};
function I(n,cls){return `<svg class="ic ${cls||''}" viewBox="0 0 24 24">${ICONS[n]||''}</svg>`;}

/* ---------------- Estado / persistencia ---------------- */
const LS='casadirecta_v2';
const OTA_FEE=0.16; // comisión media OTA (Booking/Airbnb ~15-18%)
/* Fechas SIEMPRE en formato local 'YYYY-MM-DD' para evitar bugs de UTC */
function isoLocal(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function todayISO(){return isoLocal(new Date());}
function parseISO(s){const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);} // mediodía local seguro
function addDays(iso,n){const d=parseISO(iso);d.setDate(d.getDate()+n);return isoLocal(d);}
function nightsBetween(inISO,outISO){return Math.round((parseISO(outISO)-parseISO(inISO))/864e5);}
function rangeNights(inISO,outISO){ // noches ocupadas: [in, out)
  const out=[];let cur=inISO;while(cur<outISO){out.push(cur);cur=addDays(cur,1);}return out;}

function seed(){
  const t=todayISO();
  return {
    plan:'free',
    settings:{onboarded:false, email:'', cleaning:35, depositPct:30},
    property:{
      name:'Casa Rural El Robledal',
      location:'Valle del Jerte, Cáceres',
      type:'Casa rural completa',
      desc:'Casa de piedra restaurada con vistas al valle, chimenea y porche. Ideal para desconectar en familia o en pareja. A 5 min del pueblo y de rutas de senderismo entre cerezos.',
      maxGuests:6,
      photos:[
        'https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=600',
        'https://images.unsplash.com/photo-1449158743715-0a90ebb6d2d8?w=600',
        'https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=600',
        'https://images.unsplash.com/photo-1502005229762-cf1b2da7c5d6?w=600'
      ],
      features:['WiFi','Chimenea','Parking','Piscina','Mascotas','Barbacoa','Vistas al valle','Cocina equipada']
    },
    seasons:[
      {id:'baja',name:'Temporada baja',price:90},
      {id:'media',name:'Temporada media',price:120},
      {id:'alta',name:'Temporada alta',price:165}
    ],
    /* reglas de temporada por mes (1-12) -> id de temporada */
    seasonByMonth:{1:'baja',2:'baja',3:'media',4:'media',5:'media',6:'alta',7:'alta',8:'alta',9:'media',10:'media',11:'baja',12:'alta'},
    blocked:[], // ['YYYY-MM-DD',...] días bloqueados manualmente
    external:[], // bloqueos importados por iCal: {checkin,checkout,source,summary}
    icalUrls:[], // enlaces .ics suscritos (Booking/Airbnb) — solo informativo en demo
    bookings:[
      {id:1,guest:'Familia Romero',phone:'+34611002030',guests:4,checkin:addDays(t,3),checkout:addDays(t,7),status:'conf',total:480,source:'directa',note:'Llegan sobre las 18h.',depositPaid:true,depositAmount:144},
      {id:2,guest:'Ana y Marcos',phone:'+34622003040',guests:2,checkin:addDays(t,12),checkout:addDays(t,14),status:'solic',total:240,source:'directa',note:'',depositPaid:false,depositAmount:0},
      {id:3,guest:'Grupo senderismo',phone:'+34633004050',guests:6,checkin:addDays(t,-10),checkout:addDays(t,-7),status:'conf',total:360,source:'directa',note:'Repiten clientes.',depositPaid:true,depositAmount:108}
    ],
    nextId:4,
    counters:{reqMonth:new Date().getMonth(), reqCount:0} // peticiones de reserva del huésped este mes (Free limitado)
  };
}
let db=load();
function load(){try{const r=localStorage.getItem(LS);if(r){const d=JSON.parse(r);
  if(d.counters && d.counters.reqMonth!==new Date().getMonth())d.counters={reqMonth:new Date().getMonth(),reqCount:0};
  if(!d.external)d.external=[]; if(!d.icalUrls)d.icalUrls=[];
  (d.bookings||[]).forEach(b=>{if(b.depositPaid===undefined)b.depositPaid=false;if(b.depositAmount===undefined)b.depositAmount=0;});
  return d;}}catch(e){}return seed();}
function save(){localStorage.setItem(LS,JSON.stringify(db));}

/* ---------------- Helpers ---------------- */
const FREE_REQ_LIMIT=5; // solicitudes/mes desde la web pública en Free
const $=s=>document.querySelector(s);
const isPro=()=>db.plan!=='free';
const fmtDay=iso=>parseISO(iso).toLocaleDateString('es-ES',{day:'numeric',month:'short'});
const fmtDayFull=iso=>parseISO(iso).toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
const initials=n=>n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const STLABEL={solic:'Solicitada',conf:'Confirmada',canc:'Cancelada'};
function toast(msg,icon){
  /* icon: nombre de ICONS, '' para ninguno, o por defecto check */
  let ico = icon==='' ? '' : (ICONS[icon]?`<svg class="ic" viewBox="0 0 24 24">${ICONS[icon]}</svg>`:`<svg class="ic" viewBox="0 0 24 24">${ICONS.check}</svg>`);
  const t=$('#toast');t.innerHTML=`${ico}${msg}`;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}

/* temporada y precio por noche */
function seasonForDate(iso){const m=parseISO(iso).getMonth()+1;const id=db.seasonByMonth[m]||'media';return db.seasons.find(s=>s.id===id)||db.seasons[0];}
function priceForNight(iso){const s=seasonForDate(iso);return s?s.price:0;}
function stayPrice(inISO,outISO){ // suma noches por temporada + limpieza
  let sum=0;rangeNights(inISO,outISO).forEach(n=>sum+=priceForNight(n));
  return sum+(db.settings.cleaning||0);
}
function stayNightsPrice(inISO,outISO){let sum=0;rangeNights(inISO,outISO).forEach(n=>sum+=priceForNight(n));return sum;}

/* estado de un día concreto a partir de reservas + bloqueos */
function dayState(iso){
  if(db.blocked.includes(iso))return 'bloq';
  for(const b of db.bookings){
    if(b.status==='canc')continue;
    if(rangeNights(b.checkin,b.checkout).includes(iso))return b.status==='conf'?'reservado':'solic';
  }
  // bloqueos importados por iCal (Booking/Airbnb) cuentan como reservado externo
  for(const e of (db.external||[])){
    if(rangeNights(e.checkin,e.checkout).includes(iso))return 'ext';
  }
  return 'libre';
}
function externalAt(iso){return (db.external||[]).find(e=>rangeNights(e.checkin,e.checkout).includes(iso));}
/* solapamiento: ¿el rango [in,out) choca con alguna reserva activa (excluyendo una opcional)? */
function overlaps(inISO,outISO,exclId){
  const ns=rangeNights(inISO,outISO);
  for(const b of db.bookings){
    if(b.id===exclId||b.status==='canc')continue;
    const bn=rangeNights(b.checkin,b.checkout);
    if(ns.some(n=>bn.includes(n)))return b;
  }
  // también choca con días bloqueados
  if(ns.some(n=>db.blocked.includes(n)))return {guest:'días bloqueados'};
  // y con bloqueos importados por iCal (Booking/Airbnb)
  for(const e of (db.external||[])){
    if(ns.some(n=>rangeNights(e.checkin,e.checkout).includes(n)))return {guest:(e.source||'reserva externa')};
  }
  return null;
}

/* ---------------- Plan badge ---------------- */
function updatePlanBadge(){
  const pn=$('#planName');
  pn.innerHTML = db.plan==='free'?'Free':(db.plan==='pro'?'Pro <span class="pro">PRO</span>':'Business <span class="pro">BIZ</span>');
  if(!isPro()){
    $('#usageText').textContent=`${db.counters.reqCount}/${FREE_REQ_LIMIT} solicitudes web este mes`;
    $('#upgradeBtn').style.display='block';
  }else{
    $('#usageText').textContent= db.plan==='business'?'Multi-alojamiento · sin marca':'Solicitudes ilimitadas · sin marca';
    $('#upgradeBtn').style.display='none';
  }
}

/* ---------------- Router ---------------- */
let view='dashboard';
const TITLES={dashboard:['Panel','Tu alojamiento de un vistazo'],calendario:['Calendario','Disponibilidad y reservas'],
  reservas:['Reservas','Solicitudes y confirmadas'],web:['Mi web','Tu página pública de reservas directas'],
  precios:['Precios y temporadas','Define tus tarifas por época'],suscripcion:['Suscripción','Elige tu plan']};
function pendingReqCount(){return db.bookings.filter(b=>b.status==='solic').length;}
function buildNav(){
  const pend=pendingReqCount();
  $('#nav').innerHTML=NAVITEMS.map(([v,l])=>`<button data-view="${v}" class="${v===view?'active':''}">${IC[v]} <span>${l}</span>${v==='reservas'&&pend?`<span class="badge">${pend}</span>`:''}</button>`).join('');
  $('#mnav').innerHTML=MNAVITEMS.map(([v,l])=>`<button data-view="${v}" class="${v===view?'active':''}">${IC[v]||IC.suscripcion}<span>${l}</span>${v==='reservas'&&pend?`<span class="badge">${pend}</span>`:''}</button>`).join('');
  document.querySelectorAll('#nav button, #mnav button').forEach(b=>b.addEventListener('click',()=>setView(b.dataset.view)));
}
function setView(v){view=v;$('#viewTitle').textContent=TITLES[v][0];$('#viewSub').textContent=TITLES[v][1];render();}
function render(){({dashboard:renderDashboard,calendario:renderCalendario,reservas:renderReservas,
  web:renderWeb,precios:renderPrecios,suscripcion:renderSuscripcion}[view])();
  buildNav();updatePlanBadge();}

/* ---------------- Dashboard ---------------- */
function renderDashboard(){
  const t=todayISO();
  const future=db.bookings.filter(b=>b.status!=='canc' && b.checkout>t);
  const solic=db.bookings.filter(b=>b.status==='solic');
  const conf=db.bookings.filter(b=>b.status==='conf');
  // ingresos confirmados del año en curso
  const year=new Date().getFullYear();
  const confYear=conf.filter(b=>parseISO(b.checkin).getFullYear()===year);
  const revenue=confYear.reduce((s,b)=>s+b.total,0);
  const commissionSaved=Math.round(confYear.filter(b=>b.source==='directa').reduce((s,b)=>s+b.total,0)*OTA_FEE);
  // ocupación próximos 30 días
  let occ=0;for(let i=0;i<30;i++){const st=dayState(addDays(t,i));if(st==='reservado'||st==='solic')occ++;}
  const occPct=Math.round(occ/30*100);
  const nextArrival=future.filter(b=>b.status==='conf'&&b.checkin>=t).sort((a,b)=>a.checkin<b.checkin?-1:1)[0];
  // señales pendientes de cobrar (reservas activas futuras sin señal pagada)
  const pendingDep=db.bookings.filter(b=>b.status!=='canc'&&b.checkout>=t&&!b.depositPaid);
  const pendingDepAmt=pendingDep.reduce((s,b)=>s+depositAmountFor(b),0);

  let html=`<div class="value"><div class="big">${I('trend')} Cada reserva directa te ahorra la comisión de Booking/Airbnb (~16%). Llevas <b>${commissionSaved}€</b> ahorrados este año vendiendo directo.</div></div>
  <div class="kpis">
    <div class="kpi"><div class="k">${I('euro')} Ingresos confirmados ${year}</div><div class="v">${revenue}€</div><div class="d">${confYear.length} reserva(s)</div></div>
    <div class="kpi"><div class="k">${I('trend')} Comisión ahorrada</div><div class="v">${commissionSaved}€</div><div class="d good">vs vender por OTAs (16%)</div></div>
    <div class="kpi"><div class="k">${I('bell')} Solicitudes pendientes</div><div class="v">${solic.length}</div><div class="d ${solic.length?'bad':'good'}">${solic.length?'requieren respuesta':'todo al día'}</div></div>
    <div class="kpi"><div class="k">${I('chart')} Ocupación 30 días</div><div class="v">${occPct}%</div><div class="d">${occ} de 30 noches</div></div>
  </div>`;

  if(solic.length){
    html+=`<div class="card"><div class="head"><h2>${I('bolt')} ${solic.length} solicitud(es) por confirmar</h2><button class="btn sm" onclick="setView('reservas')">Revisar ${I('arrow')}</button></div><div class="body">`;
    html+=solic.slice(0,3).map(bookingRow).join('');
    html+=`</div></div>`;
  }

  if(pendingDep.length){
    html+=`<div class="card"><div class="head"><h2>${I('wallet')} Señales pendientes de cobrar</h2><span class="hint" style="margin:0">${pendingDepAmt}€ por asegurar</span></div><div class="body">`;
    html+=pendingDep.slice(0,3).map(b=>`<div style="display:flex;align-items:center;gap:14px;padding:12px 14px;flex-wrap:wrap">
      <span class="avatar">${initials(b.guest)}</span>
      <div class="booking-rowinfo"><b>${b.guest}</b><div class="svc">${fmtDay(b.checkin)} → ${fmtDay(b.checkout)} · señal ${depositAmountFor(b)}€</div></div>
      <span class="pill solic nodot">Sin señal</span>
      <button class="btn sm" onclick="markDepositPaid(${b.id})">${I('check')} Cobrada</button>
      <button class="btn ghost sm" onclick="openBookingModal(${b.id})">Ver</button></div>`).join('');
    html+=`</div></div>`;
  }

  html+=`<div class="card"><div class="head"><h2>Próxima llegada</h2><button class="btn ghost sm" onclick="setView('calendario')">Ver calendario</button></div><div class="body">`;
  if(nextArrival){
    const nights=nightsBetween(nextArrival.checkin,nextArrival.checkout);
    html+=`<div style="padding:14px 14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">

function calMove(n){const r=parseISO(calRef);r.setMonth(r.getMonth()+n);calRef=isoLocal(r);render();}
function calToday(){calRef=todayISO();render();}
function startPick(){pickMode={checkin:null,hover:null};render();}
function cancelPick(){pickMode=null;render();}
function dayHover(iso){if(pickMode&&pickMode.checkin){pickMode.hover=iso;render();}}
function dayClick(iso){
  if(!pickMode){ // sin modo: si hay reserva ese día, abrir; si libre, info
    const b=db.bookings.find(x=>x.status!=='canc'&&rangeNights(x.checkin,x.checkout).includes(iso));
    if(b){openBookingModal(b.id);return;}
    if(db.blocked.includes(iso)){toast('Día bloqueado. Usa "Bloquear / liberar días" para liberarlo.','lock');return;}
    const ex=externalAt(iso);
    if(ex){toast('Ocupado en '+(ex.source||'OTA')+' (importado por iCal): '+(ex.summary||'reserva externa'),'');return;}
    toast(`${fmtDayFull(iso)} libre · ${priceForNight(iso)}€/noche`,'');return;
  }
  const st=dayState(iso);
  if(!pickMode.checkin){
    if(st!=='libre'){toast('Ese día no está libre. Elige una entrada disponible.','');return;}
    pickMode.checkin=iso;pickMode.hover=null;render();return;
  }
  // segundo clic = salida
  if(iso<=pickMode.checkin){toast('La salida debe ser posterior a la entrada.','');return;}
  const conflict=overlaps(pickMode.checkin,iso,null);
  if(conflict){toast('Ese rango choca con '+(conflict.guest||'una reserva')+'.','');return;}
  const ci=pickMode.checkin;pickMode=null;
  openBookingModal(0,ci,iso);
}

/* ---------------- Sincronización iCal (Booking/Airbnb) ---------------- */
/* Parser .ics minimalista: extrae VEVENT con DTSTART/DTEND (formato YYYYMMDD) + SUMMARY.
   Las OTAs exportan rangos [DTSTART, DTEND) igual que nuestras noches → encaja directo. */
function parseIcs(text,source){
  const out=[];const lines=text.replace(/\r\n[ \t]/g,'').split(/\r?\n/); // des-doblar líneas plegadas
  let cur=null;
  for(let raw of lines){
    const line=raw.trim();
    if(line==='BEGIN:VEVENT'){cur={};continue;}
    if(line==='END:VEVENT'){ if(cur&&cur.checkin&&cur.checkout&&cur.checkout>cur.checkin){cur.source=source;out.push(cur);} cur=null;continue;}
    if(!cur)continue;
    const dm=line.match(/^DTSTART[^:]*:(\d{8})/); if(dm){cur.checkin=`${dm[1].slice(0,4)}-${dm[1].slice(4,6)}-${dm[1].slice(6,8)}`;continue;}
    const em=line.match(/^DTEND[^:]*:(\d{8})/);   if(em){cur.checkout=`${em[1].slice(0,4)}-${em[1].slice(4,6)}-${em[1].slice(6,8)}`;continue;}
    const sm=line.match(/^SUMMARY:(.*)$/);         if(sm){cur.summary=sm[1].trim();continue;}
  }
  return out;
}
function openIcalModal(){

  openModal(`<div class="mhead"><h3>Sincronizar con Booking/Airbnb (iCal)</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mbody">
      <p class="hint" style="margin-bottom:12px"><b>Importar:</b> pega el contenido del archivo .ics que te dan Booking o Airbnb (Calendario → Exportar/Sincronizar). Bloqueará en tu calendario las fechas ya ocupadas en esas plataformas para que nadie reserve dos veces.</p>
      <div class="row2"><div><label>Plataforma</label><select id="ic_src"><option value="Booking">Booking</option><option value="Airbnb">Airbnb</option><option value="Otra OTA">Otra OTA</option></select></div>
      <div><label>URL del calendario (opcional)</label><input type="text" id="ic_url" placeholder="https://...ics"></div></div>
      <label>Contenido del .ics</label><textarea id="ic_text" style="min-height:120px" placeholder="BEGIN:VCALENDAR&#10;BEGIN:VEVENT&#10;DTSTART;VALUE=DATE:20260815&#10;DTEND;VALUE=DATE:20260818&#10;SUMMARY:CLOSED - Not available&#10;END:VEVENT&#10;END:VCALENDAR"></textarea>
      <div class="hint" style="margin-top:4px"><a href="#" onclick="fillIcsDemo();return false" style="color:var(--blue)">Cargar un .ics de ejemplo</a> para probar.</div>
      <div class="err" id="ic_err"></div><div class="ok" id="ic_ok"></div>

        <div style="margin-top:8px">${ext.length?ext.map((e,i)=>`<div style="display:flex;align-items:center;gap:8px;font-size:13px;padding:5px 0">
          <span class="pill" style="background:rgba(74,157,232,.18);color:var(--blue)">${e.source}</span>
          <span style="flex:1">${fmtDay(e.checkin)} → ${fmtDay(e.checkout)} ${e.summary?'· '+e.summary:''}</span>
          <button class="btn ghost sm" onclick="delExternal(${i})">${I('x')}</button></div>`).join(''):'<span class="hint">Aún no has importado fechas externas.</span>'}</div>
      </div>

        <b style="font-size:14px">Exportar tu calendario</b>

        <div class="seg"><button class="btn ghost sm" onclick="copyMyIcs()">${I('copy')} Copiar mi .ics</button><button class="btn ghost sm" onclick="downloadMyIcs()">${I('download')} Descargar .ics</button></div>
      </div>
    </div>
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">Cerrar</button><button class="btn blue" onclick="importIcs()">Importar fechas</button></div>`);
}
function fillIcsDemo(){
  const a=addDays(todayISO(),20),b=addDays(a,4),c=addDays(todayISO(),40),d2=addDays(c,3);
  const f=s=>s.replace(/-/g,'');
  $('#ic_text').value=`BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART;VALUE=DATE:${f(a)}\nDTEND;VALUE=DATE:${f(b)}\nSUMMARY:CLOSED - Not available\nEND:VEVENT\nBEGIN:VEVENT\nDTSTART;VALUE=DATE:${f(c)}\nDTEND;VALUE=DATE:${f(d2)}\nSUMMARY:Reserved\nEND:VEVENT\nEND:VCALENDAR`;
}
function importIcs(){
  const err=$('#ic_err'),ok=$('#ic_ok');err.style.display='none';ok.style.display='none';
  const src=$('#ic_src').value;const text=$('#ic_text').value;const url=$('#ic_url').value.trim();
  if(!text.includes('VEVENT')){err.textContent='Pega un .ics válido (debe contener VEVENT). Usa el ejemplo para probar.';err.style.display='block';return;}
  const events=parseIcs(text,src);
  if(!events.length){err.textContent='No se encontraron fechas en el .ics.';err.style.display='block';return;}
  // evita duplicados exactos
  let added=0,conflicts=0;
  for(const e of events){
    if((db.external||[]).some(x=>x.checkin===e.checkin&&x.checkout===e.checkout&&x.source===e.source))continue;
    // si choca con una reserva DIRECTA propia, avisa pero no la pisa
    if(overlaps(e.checkin,e.checkout,null)){conflicts++;}
    db.external.push(e);added++;
  }
  if(url&&!db.icalUrls.includes(url))db.icalUrls.push(url);
  save();
  ok.textContent=`${added} bloqueo(s) importados de ${src}.`+(conflicts?` ${conflicts} solapan con reservas directas tuyas — revísalo.`:'');
  ok.style.display='block';
  setTimeout(()=>{openIcalModal();},900);
  render();
}
function delExternal(i){db.external.splice(i,1);save();openIcalModal();render();toast('Bloqueo externo eliminado');}
function buildMyIcs(){
  const stamp=isoLocal(new Date()).replace(/-/g,'')+'T120000Z';
  let s='BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//CasaDirecta//ES\nCALSCALE:GREGORIAN\n';
  const ev=(ci,co,sum,uid)=>{s+=`BEGIN:VEVENT\nUID:${uid}@casadirecta\nDTSTAMP:${stamp}\nDTSTART;VALUE=DATE:${ci.replace(/-/g,'')}\nDTEND;VALUE=DATE:${co.replace(/-/g,'')}\nSUMMARY:${sum}\nEND:VEVENT\n`;};
  db.bookings.filter(b=>b.status!=='canc').forEach(b=>ev(b.checkin,b.checkout,(b.status==='conf'?'Reservado':'Solicitado')+' - '+b.guest,'b'+b.id));
  // días bloqueados consecutivos como un único evento por día (simple y válido)
  db.blocked.slice().sort().forEach((d,i)=>ev(d,addDays(d,1),'Bloqueado','blk'+i));
  s+='END:VCALENDAR';return s;
}
function copyMyIcs(){const t=buildMyIcs();navigator.clipboard&&navigator.clipboard.writeText(t).then(()=>toast('.ics copiado al portapapeles','copy'),()=>fallbackCopy(t));}
function downloadMyIcs(){const t=buildMyIcs();const blob=new Blob([t],{type:'text/calendar'});const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='casadirecta.ics';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),2000);toast('.ics descargado','download');}
function fallbackCopy(t){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('.ics copiado','copy');}catch(e){toast('Copia manual: revisa la consola','');}document.body.removeChild(ta);}

        <div><label>Salida</label><input type="date" id="b_co" value="${co}" oninput="recalcStay()"></div></div>

      <div id="stayCalc" style="background:var(--surface2);border-radius:10px;padding:12px 14px;margin-top:14px"></div>
      ${b?depositBox(b):''}
      <div class="err" id="b_err"></div>
    </div>
    <div class="mfoot">
      ${b?`<button class="btn danger" style="margin-right:auto" onclick="delBooking(${b.id})">Eliminar</button>`:''}
      ${b&&b.status==='solic'?`<button class="btn ghost" onclick="confirmBooking(${b.id});closeModal()">Confirmar</button>`:''}
      <button class="btn ghost" onclick="closeModal()">Cerrar</button>
      <button class="btn" onclick="saveBooking(${b?b.id:0})">${b?'Guardar':'Crear reserva'}</button></div>`);
  recalcStay();
}
function recalcStay(){
  const ci=$('#b_ci').value,co=$('#b_co').value;const box=$('#stayCalc');if(!box)return;
  if(!ci||!co||co<=ci){box.innerHTML='<span class="hint" style="margin:0">Selecciona entrada y salida válidas.</span>';return;}
  const nights=nightsBetween(ci,co);const nightsSum=stayNightsPrice(ci,co);const total=nightsSum+(db.settings.cleaning||0);
  const deposit=Math.round(total*(db.settings.depositPct||0)/100);
  const saved=Math.round(total*OTA_FEE);
  box.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:13.5px"><span>${nights} noche(s) (por temporada)</span><b>${nightsSum}€</b></div>
    <div style="display:flex;justify-content:space-between;font-size:13.5px;margin-top:4px"><span>Limpieza</span><b>${db.settings.cleaning||0}€</b></div>
    <div style="display:flex;justify-content:space-between;font-size:16px;margin-top:8px;border-top:1px solid var(--border);padding-top:8px"><b>Total estancia</b><b style="color:var(--accent)">${total}€</b></div>
    <div class="hint" style="margin-top:6px">Señal sugerida (${db.settings.depositPct||0}%): <b>${deposit}€</b> · Ahorro de comisión vs OTA: <b style="color:var(--accent)">${saved}€</b></div>`;
}
function saveBooking(id){
  const guest=$('#b_guest').value.trim();const phone=$('#b_phone').value.trim();
  const guests=Math.max(1,+$('#b_guests').value||1);const ci=$('#b_ci').value,co=$('#b_co').value;
  const note=$('#b_note').value;const err=$('#b_err');
  const fail=m=>{err.textContent=m;err.style.display='block';};
  if(!guest)return fail('Indica el nombre del huésped.');
  if(!ci||!co)return fail('Indica entrada y salida.');
  if(co<=ci)return fail('La salida debe ser posterior a la entrada.');
  if(guests>db.property.maxGuests)return fail('Supera el aforo máximo ('+db.property.maxGuests+').');
  const conflict=overlaps(ci,co,id);
  if(conflict){return fail('Esas fechas chocan con '+(conflict.guest||'otra reserva')+'. Evita el doble-booking.');}
  const total=stayPrice(ci,co);
  if(id){const b=db.bookings.find(x=>x.id===id);Object.assign(b,{guest,phone,guests,checkin:ci,checkout:co,note,total});}
  else{db.bookings.push({id:db.nextId++,guest,phone,guests,checkin:ci,checkout:co,status:'conf',total,source:'directa',note,depositPaid:false,depositAmount:0});}
  save();closeModal();render();toast(id?'Reserva actualizada':'Reserva creada · '+total+'€','check');
}
function delBooking(id){db.bookings=db.bookings.filter(b=>b.id!==id);save();closeModal();render();toast('Reserva eliminada','');}

/* ---------------- Señal / depósito (cobro) ---------------- */
function depositAmountFor(b){return Math.round((b.total||0)*(db.settings.depositPct||0)/100);}
function depositBox(b){
  const sug=depositAmountFor(b);
  if(b.depositPaid){
    return `<div style="background:rgba(52,199,123,.12);border:1px solid var(--accent);border-radius:10px;padding:12px 14px;margin-top:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <b style="color:var(--accent)">Señal cobrada: ${b.depositAmount||sug}€</b>
      <button class="btn ghost sm" style="margin-left:auto" onclick="unmarkDeposit(${b.id})">Marcar pendiente</button></div>`;
  }
  return `<div style="background:rgba(232,162,58,.1);border:1px solid rgba(232,162,58,.4);border-radius:10px;padding:12px 14px;margin-top:12px">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><b style="color:var(--amber)">Señal pendiente (${db.settings.depositPct||0}%): ${sug}€</b></div>
    <div class="seg" style="margin-top:10px">
      <button class="btn sm" onclick="markDepositPaid(${b.id})">${I('check')} Registrar señal cobrada</button>
      <button class="btn ghost sm" onclick="sendDepositLink(${b.id})">${I('link')} ${isPro()?'Enviar enlace de pago':'Enlace de pago (Pro)'}</button>
    </div></div>`;
}
function markDepositPaid(id){const b=db.bookings.find(x=>x.id===id);if(!b)return;b.depositPaid=true;b.depositAmount=depositAmountFor(b);save();
  if($('#modalBg').classList.contains('show'))openBookingModal(id);render();toast('Señal registrada como cobrada · '+b.depositAmount+'€','check');}
function unmarkDeposit(id){const b=db.bookings.find(x=>x.id===id);if(!b)return;b.depositPaid=false;save();openBookingModal(id);render();toast('Señal marcada como pendiente');}
function sendDepositLink(id){const b=db.bookings.find(x=>x.id===id);if(!b)return;
  if(!isPro()){openPaywall('El cobro de la señal con enlace de pago online está en Pro. Cobra por adelantado para asegurar la reserva.');return;}
  const amount=depositAmountFor(b);
  const msg=encodeURIComponent(`Hola ${b.guest}, para confirmar tu reserva en ${db.property.name} (${fmtDay(b.checkin)} → ${fmtDay(b.checkout)}) abona la señal de ${amount}€ en este enlace: [enlace de pago]. ¡Gracias!`);
  const phone=(b.phone||'').replace(/[^\d+]/g,'').replace(/^\+/,'');
  if(/^\d{6,}$/.test(phone)){window.open(`https://wa.me/${phone}?text=${msg}`,'_blank');toast('Mensaje de cobro abierto en WhatsApp','send');}
  else{toast('Sin teléfono válido: copia el mensaje desde las notas','');}
}

  const name=$('#g_name').value.trim();const contact=$('#g_contact').value.trim();
  const guests=Math.max(1,+$('#g_guests').value||1);const ci=$('#g_ci').value,co=$('#g_co').value;
  const err=$('#g_err');const ok=$('#g_ok');err.style.display='none';ok.style.display='none';
  const fail=m=>{err.textContent=m;err.style.display='block';};
  if(!name)return fail('Pon tu nombre.');
  if(!contact)return fail('Pon un teléfono o email de contacto.');
  if(!ci||!co||co<=ci)return fail('Fechas inválidas.');
  if(guests>db.property.maxGuests)return fail('Supera el aforo ('+db.property.maxGuests+').');
  if(overlaps(ci,co,null))return fail('Esas fechas ya no están disponibles.');
  // límite Free de solicitudes web
  if(!isPro()&&db.counters.reqCount>=FREE_REQ_LIMIT){
    closeModal();$('#modal').classList.remove('wide');
    openPaywall('Has alcanzado el límite de '+FREE_REQ_LIMIT+' solicitudes web/mes del plan Free. Con Pro son ilimitadas.');return;}
  const total=stayPrice(ci,co);
  db.bookings.push({id:db.nextId++,guest:name,phone:contact,guests,checkin:ci,checkout:co,status:'solic',total,source:'directa',note:'Solicitud desde la web pública',depositPaid:false,depositAmount:0});
  if(!isPro())db.counters.reqCount++;
  save();
  ok.textContent='¡Solicitud enviada! El dueño la verá en su panel de Reservas y la confirmará.';ok.style.display='block';
  setTimeout(()=>{closeModal();$('#modal').classList.remove('wide');setView('reservas');toast('Nueva solicitud de reserva recibida','bell');},1400);
}

/* ---------------- Precios y temporadas ---------------- */
const MONTHS=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function renderPrecios(){
  let html=`<div class="value"><div class="big">${I('euro')} Define un precio por temporada y asígnalo a cada mes. El total de cada reserva se calcula <b>automáticamente</b> sumando las noches.</div></div>`;
  html+=`<div class="card"><div class="head"><h2>Precios por temporada</h2></div><div class="body" style="padding:16px 18px">`;
  db.seasons.forEach(s=>{
    html+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap">
      <input type="text" value="${s.name.replace(/"/g,'&quot;')}" style="flex:1;min-width:160px" onchange="editSeasonName('${s.id}',this.value)">
      <div style="display:flex;align-items:center;gap:6px"><input type="number" min="0" value="${s.price}" style="width:110px" onchange="editSeasonPrice('${s.id}',this.value)"><span class="hint" style="margin:0">€/noche</span></div></div>`;
  });
  html+=`</div></div>`;
  html+=`<div class="card"><div class="head"><h2>Temporada por mes</h2></div><div class="body" style="padding:16px 18px">
    <p class="hint" style="margin:0 0 12px">Asigna a cada mes su temporada. Esto fija el precio por noche del calendario.</p>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">`;
  for(let m=1;m<=12;m++){
    html+=`<div style="display:flex;align-items:center;gap:8px"><span style="width:34px;font-weight:700;font-size:13px">${MONTHS[m-1]}</span>
      <select onchange="setMonthSeason(${m},this.value)" style="flex:1">${db.seasons.map(s=>`<option value="${s.id}" ${db.seasonByMonth[m]===s.id?'selected':''}>${s.name}</option>`).join('')}</select></div>`;
  }
  html+=`</div></div></div>`;
  html+=`<div class="card"><div class="head"><h2>Otros cargos</h2></div><div class="body" style="padding:16px 18px">
    <div class="row2">
      <div><label>Limpieza (€ por estancia)</label><input type="number" min="0" value="${db.settings.cleaning}" onchange="db.settings.cleaning=Math.max(0,+this.value||0);save();toast('Guardado')"></div>
      <div><label>Señal / depósito (% del total)</label><input type="number" min="0" max="100" value="${db.settings.depositPct}" onchange="db.settings.depositPct=Math.min(100,Math.max(0,+this.value||0));save();toast('Guardado')"></div>
    </div>
    <p class="hint" style="margin-top:10px">La señal es lo que el huésped paga por adelantado para bloquear las fechas.${isPro()?'':' <b>Cobro online de la señal</b> disponible en Pro.'}</p>
  </div></div>`;
  $('#content').innerHTML=html;
}
function editSeasonName(id,v){const s=db.seasons.find(x=>x.id===id);if(s){s.name=v.trim()||s.name;save();}}
function editSeasonPrice(id,v){const s=db.seasons.find(x=>x.id===id);if(s){s.price=Math.max(0,+v||0);save();toast('Precio actualizado');render();}}
function setMonthSeason(m,id){db.seasonByMonth[m]=id;save();toast(MONTHS[m-1]+' → '+(db.seasons.find(s=>s.id===id).name));}

/* ---------------- Suscripción ---------------- */
function renderSuscripcion(){
  const p=db.plan;
  const card=(id,name,price,sub,feats,feat)=>`<div class="price ${feat?'feat':''}">${feat?'<div class="tag">MÁS ELEGIDO</div>':''}
    <h3>${name}</h3><div class="amt">${price}<span>${price==='0€'?'':'/mes'}</span></div><div class="hint">${sub}</div>
    <ul>${feats.map(f=>`<li class="${f[0]?'':'off'}"><span class="c">${f[0]?I('check'):''}</span>${f[1]}</li>`).join('')}</ul>
    ${p===id?'<button class="btn ghost" disabled>Plan actual</button>':`<button class="btn ${feat?'':'ghost'}" onclick="openCheckout('${id}','${name}','${price}')">${id==='free'?'Bajar a Free':'Elegir '+name}</button>`}</div>`;
  let html=`<div class="value"><div class="big">${I('trend')} Una sola reserva directa de 600€ te ahorra ~<b>96€</b> de comisión. CasaDirecta Pro cuesta <b>29€/mes</b>: se paga solo con la primera reserva.</div></div>
  <div class="pricing">
    ${card('free','Free','0€','Prueba la herramienta',[[1,'1 alojamiento'],[1,'Calendario y reservas'],[1,'Web pública (con marca)'],[1,'Hasta 3 fotos'],[1,'Hasta 5 solicitudes web/mes'],[0,'Solicitudes web ilimitadas'],[0,'Sincronización iCal (Booking/Airbnb)'],[0,'Cobro de señal online'],[0,'Sin marca + dominio propio']])}
    ${card('pro','Pro','29€','Para tu casa rural',[[1,'Todo lo de Free'],[1,'Solicitudes web ilimitadas'],[1,'Galería de fotos ilimitada'],[1,'Sin marca de agua + dominio propio'],[1,'Cobro de señal (registro + enlace WhatsApp)'],[1,'Sincronización iCal (Booking/Airbnb)'],[1,'Avisos al huésped por WhatsApp']],true)}
    ${card('business','Business','49€','Para varios alojamientos',[[1,'Todo lo de Pro'],[1,'Multi-alojamiento (ilimitados)'],[1,'Calendario unificado'],[1,'Informe de ingresos por casa'],[1,'Soporte prioritario'],[1,'Página de marca para todas']])}
  </div>
  <p class="hint" style="text-align:center;margin-top:18px">Pago seguro · Cancela cuando quieras · Checkout de demostración (integrable con Stripe)</p>`;
  $('#content').innerHTML=html;
}

/* ---------------- Modales base ---------------- */
function openModal(html){$('#modal').classList.remove('wide');$('#modal').innerHTML=html;$('#modalBg').classList.add('show');}
function closeModal(){$('#modalBg').classList.remove('show');$('#modal').classList.remove('wide');}
$('#modalBg').addEventListener('click',e=>{if(e.target.id==='modalBg'){closeModal();}});

/* ----- Onboarding + Ajustes ----- */
function openOnboarding(){
  openModal(`<div class="mhead"><h3>Bienvenido a CasaDirecta</h3></div>
    <div class="mbody">
      <p class="hint" style="margin-bottom:14px">Configura tu alojamiento para crear tu web y empezar a recibir reservas directas.</p>
      <label>Nombre del alojamiento</label><input type="text" id="ob_name" placeholder="Ej. Casa Rural El Robledal">
      <label>Ubicación</label><input type="text" id="ob_loc" placeholder="Ej. Valle del Jerte, Cáceres">
      <div class="row2"><div><label>Aforo máx.</label><input type="number" id="ob_max" value="6" min="1"></div>
        <div><label>Precio base (€/noche)</label><input type="number" id="ob_price" value="120" min="1"></div></div>
      <div class="err" id="ob_err"></div>
    </div>
    <div class="mfoot"><button class="btn" onclick="saveOnboarding()">Empezar ${I('arrow')}</button></div>`);
}
function saveOnboarding(){
  const name=$('#ob_name').value.trim();
  if(!name){$('#ob_err').textContent='Pon el nombre de tu alojamiento.';$('#ob_err').style.display='block';return;}
  db.property.name=name;
  db.property.location=$('#ob_loc').value.trim()||db.property.location;
  db.property.maxGuests=Math.max(1,+$('#ob_max').value||6);
  const base=Math.max(1,+$('#ob_price').value||120);
  // ajusta temporadas alrededor del precio base
  db.seasons=[{id:'baja',name:'Temporada baja',price:Math.round(base*0.75)},
    {id:'media',name:'Temporada media',price:base},
    {id:'alta',name:'Temporada alta',price:Math.round(base*1.35)}];
  db.settings.onboarded=true;save();closeModal();render();toast('¡Listo! Tu web ya está creada','check');
}
function openSettings(){
  openModal(`<div class="mhead"><h3>Ajustes</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mbody">
      <label>Email de contacto</label><input type="email" id="st_email" value="${db.settings.email||''}" placeholder="tu@email.com">
      <p class="hint" style="margin-top:10px">La limpieza y el % de señal se configuran en <a href="#" onclick="closeModal();setView('precios');return false" style="color:var(--accent)">Precios y temporadas</a>.</p>
      <div class="hint" style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px">Zona de datos</div>
      <button class="btn ghost sm" style="margin-top:8px" onclick="resetDemo()">Reiniciar datos de demostración</button>
    </div>
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn" onclick="saveSettings()">Guardar</button></div>`);
}
function saveSettings(){
  db.settings.email=$('#st_email').value.trim();
  save();closeModal();render();toast('Ajustes guardados');
}
function resetDemo(){localStorage.removeItem(LS);db=seed();save();closeModal();calRef=todayISO();setView('dashboard');toast('Datos reiniciados','sync');}

/* ---------------- Paywall + Checkout ---------------- */
function openPaywall(reason){
  openModal(`<div class="mhead"><h3>Sube a Pro</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mbody"><p style="margin-bottom:14px">${reason}</p>
      <p class="hint" style="margin-bottom:6px">Con <b style="color:var(--accent)">Pro (29€/mes)</b>: solicitudes web ilimitadas, galería sin límite, sin marca de agua + dominio propio, cobro de señal online y sincronización con Booking/Airbnb.</p></div>
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">Ahora no</button>
      <button class="btn" onclick="openCheckout('pro','Pro','29€')">Pasar a Pro ${I('arrow')}</button></div>`);
}
function openCheckout(id,name,price){
  if(id==='free'){db.plan='free';save();closeModal();render();toast('Has cambiado a Free');return;}
  openModal(`<div class="mhead"><h3>Suscripción ${name} · ${price}/mes</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mbody">
      <label>Email</label><input type="text" id="ck_email" placeholder="tu@email.com" value="${db.settings.email||''}">
      <label>Número de tarjeta</label><input type="text" id="ck_card" inputmode="numeric" placeholder="4242 4242 4242 4242" maxlength="19">
      <div class="row2"><div><label>Caducidad</label><input type="text" id="ck_exp" placeholder="MM/AA" maxlength="5"></div>
        <div><label>CVC</label><input type="text" id="ck_cvc" inputmode="numeric" placeholder="123" maxlength="4"></div></div>
      <div class="err" id="ck_err"></div>
      <p class="hint" style="margin-top:14px">Demostración. No se realiza ningún cobro. Integrable con Stripe Checkout en producción.</p></div>
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn" id="ck_pay" onclick="doPay('${id}','${name}')">Pagar ${price}/mes</button></div>`);
  $('#ck_card').addEventListener('input',e=>{let v=e.target.value.replace(/\D/g,'').slice(0,16);e.target.value=v.replace(/(.{4})/g,'$1 ').trim();});
  $('#ck_exp').addEventListener('input',e=>{let v=e.target.value.replace(/\D/g,'').slice(0,4);if(v.length>=3)v=v.slice(0,2)+'/'+v.slice(2);e.target.value=v;});
  $('#ck_cvc').addEventListener('input',e=>{e.target.value=e.target.value.replace(/\D/g,'');});
}
function doPay(id,name){
  const email=$('#ck_email').value.trim();const card=$('#ck_card').value.replace(/\s/g,'');
  const exp=$('#ck_exp').value;const cvc=$('#ck_cvc').value;const err=$('#ck_err');
  const fail=m=>{err.textContent=m;err.style.display='block';};
  if(!/.+@.+\..+/.test(email))return fail('Introduce un email válido.');
  if(card.length<15)return fail('Número de tarjeta incompleto.');
  if(!/^\d{2}\/\d{2}$/.test(exp))return fail('Caducidad inválida (MM/AA).');
  if(cvc.length<3)return fail('CVC incompleto.');
  const btn=$('#ck_pay');btn.textContent='Procesando…';btn.disabled=true;
  setTimeout(()=>{db.plan=id;db.settings.email=email;save();closeModal();render();updatePlanBadge();
    toast(`¡Bienvenido a ${name}! Suscripción activa`,'check');},900);
}

/* ---------------- init ---------------- */
$('#newBookingBtn').addEventListener('click',()=>openBookingModal());
$('#upgradeBtn').addEventListener('click',()=>setView('suscripcion'));
$('#settingsBtn').addEventListener('click',openSettings);
buildNav();updatePlanBadge();setView('dashboard');
if(!db.settings.onboarded)openOnboarding();
</script>
</body>
</html>
